*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

html,body,#root{height:100%;width:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg-chat);color:var(--txt);overflow:hidden}
.shell{display:flex;flex-direction:column;height:100vh;width:100%}
.ch{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--bg-head);border-bottom:1px solid var(--border);flex-shrink:0}
.ch-av{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0}
.ch-info{flex:1}
.ch-name{font-size:16px;font-weight:600;line-height:1.2}
.ch-status{font-size:13px;color:var(--accent)}
.ch-status.typing{animation:blink 1.2s ease-in-out infinite}

.msgs{flex:1;overflow-y:auto;padding:16px 16px 8px;display:flex;flex-direction:column;gap:4px}
.msgs::-webkit-scrollbar{width:6px}
.msgs::-webkit-scrollbar-thumb{background:#2a3942;border-radius:3px}
.dsep{display:flex;align-items:center;justify-content:center;margin:8px 0}
.dsep span{background:#182229cc;color:var(--muted);font-size:12px;padding:3px 10px;border-radius:8px}
.row{display:flex;margin:1px 0}
.row.in{justify-content:flex-start}
.row.out{justify-content:flex-end}
.bub{max-width:70%;padding:6px 10px 8px;border-radius:8px;font-size:14.5px;line-height:1.5;word-break:break-word;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.bub.in{background:var(--bg-in);border-top-left-radius:0}
.bub.out{background:var(--bg-out);border-top-right-radius:0}
.btime{font-size:11px;color:var(--time);float:right;margin-left:8px;margin-top:2px;line-height:1}
.bchk{font-size:11px;color:#53bdeb;margin-left:2px;letter-spacing:-2px}
.bimg{max-width:280px;border-radius:8px;overflow:hidden;animation:fi .2s ease}
.bimg img{width:100%;display:block}
.ctab{background:var(--bg-in);border-radius:8px;border-top-left-radius:0;overflow:hidden;max-width:70%;animation:fi .2s ease}
.ctab-txt{padding:8px 12px 6px;font-size:14.5px;line-height:1.5;white-space:pre-line}
.ctab-btn{display:block;width:100%;padding:14px;background:var(--cta);color:#fff;font-size:14px;font-weight:700;text-align:center;text-decoration:none;border:none;cursor:pointer;transition:background .2s}
.ctab-btn:hover{background:var(--ctah)}
.typ{display:flex;align-items:center;gap:4px;padding:10px 12px;background:var(--bg-in);border-radius:8px;border-top-left-radius:0;width:fit-content;animation:fi .15s ease}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
.inp-area{padding:10px 12px;background:var(--bg-head);border-top:1px solid var(--border);display:flex;align-items:flex-end;gap:10px;flex-shrink:0}
.inp{flex:1;background:#2a3942;border:none;border-radius:8px;color:var(--txt);font-size:15px;padding:10px 14px;resize:none;min-height:42px;max-height:120px;line-height:1.4;outline:none;font-family:inherit}

@media(max-width:768px){.bub,.ctab{max-width:85%}.bimg{max-width:240px}}

function detectContext(text){
  var s=text.toLowerCase().trim();
  var cats=[
    ["elogio",["linda","maravilhosa","gata","perfeita","bonita","princesa","lindona","delícia","delicia"]],
    ["duvida",["dúvida","duvida","não sei","nao sei","talvez","pensando","pera","sem certeza"]],
    ["curiosidade",["que coisa","quero ver","o que é","o que e","como assim","cadê","cade"]],
    ["preco",["preço","preco","quanto custa","quanto é","quanto e","caro","barato","pagamento","pix","cartão","cartao"]],
    ["desconfianca",["golpe","fake","confiável","confiavel","é real","e real","funciona mesmo"]],
    ["negativa",["não quero","nao quero","agora não","agora nao","sai fora","melhor não","melhor nao"]],
    ["positiva",["pode sim","com certeza","claro que","manda logo"]],
    ["saudacao",["boa noite","bom dia","boa tarde","e aí","e ai"]],
    ["curta",["tabom","aham","kkk","blz","haha"]]
  ];
  for(var i=0;i<cats.length;i++){
    var name=cats[i][0],words=cats[i][1];
    for(var j=0;j<words.length;j++){
      if(s===words[j]||s.includes(words[j])) return name;
    }
  }
  return null;
}
function getContextReply(ctx){
  if(!ctx||!CONTEXT_REPLIES[ctx]) return null;
  var arr=CONTEXT_REPLIES[ctx];
  return arr[Math.floor(Math.random()*arr.length)];
}

  elogio:"Ahh… assim você me deixa sem graça 😳",

  positiva:"Sabia que você ia ficar curioso 😅"
};
function getAIContextReply(message,stage,flowType,customerName,ctx){
  return fetch('/api/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      message:message,
      stage:stage,
      flowType:flowType||'normal',
      customerName:customerName||'',
      context:ctx||'generica'
    })
  })
  .then(function(res){if(!res.ok)throw new Error('api_error');return res.json();})
  .then(function(data){return data.reply||null;})
  .catch(function(){return LOCAL_FALLBACK[ctx]||"Gostei do seu jeito de falar 😅";});
}

function detectIntent(text){
  var s=text.toLowerCase().trim();
  if(CONFIG.neg.some(function(k){return s===k||s.startsWith(k+" ")||s.endsWith(" "+k);})) return "neg";
  if(CONFIG.hes.some(function(k){return s.includes(k);})) return "hes";
  if(CONFIG.pos.some(function(k){return s===k||s.startsWith(k+" ")||s.includes(k);})) return "pos";
  return "redirect";
}

function extractName(t){
  var pfx=[/^pode me chamar de\s+/i,/^chama eu de\s+/i,/^me chama de\s+/i,
           /^me chamo\s+/i,/^meu nome e\s+/i,/^meu nome eh\s+/i,
           /^eu sou\s+/i,/^sou\s+/i];
  var c=t.trim();
  for(var i=0;i<pfx.length;i++){var r=c.replace(pfx[i],"");if(r!==c){c=r;break;}}
  var f=c.trim().split(/\s+/)[0];
  if(!f||f.length===0) return t.trim().split(/\s+/)[0];
  return f.charAt(0).toUpperCase()+f.slice(1).toLowerCase();
}

var SKEY="julia_v5";
function loadState(){try{var r=localStorage.getItem(SKEY);if(r)return JSON.parse(r);}catch(e){}return null;}
function saveState(m,s,n,rc,retCnt){try{localStorage.setItem(SKEY,JSON.stringify({messages:m,stage:s,name:n,reactivations:rc||0,returnCount:retCnt||0}));}catch(e){}}


function isReturning(){
  var sv=loadState();
  return !!(sv&&sv.name&&sv.messages&&sv.messages.length>0);
}

function Dots(){
  return React.createElement("div",{className:"row in"},
    React.createElement("div",{className:"typ"},
      React.createElement("div",{className:"dot"}),
      React.createElement("div",{className:"dot"}),
      React.createElement("div",{className:"dot"})));
}
function Bubble(p){
  var m=p.msg,dir=m.from==="julia"?"in":"out";
  return React.createElement("div",{className:"row "+dir},
    React.createElement("div",{className:"bub "+dir},m.text,
      React.createElement("span",{className:"btime"},m.time,
        m.from==="user"&&React.createElement("span",{className:"bchk"},"✓✓"))));
}
function Img(p){
  var src=p&&p.src?p.src:CONFIG.hookImage;
  return React.createElement("div",{className:"row in"},
    React.createElement("div",{className:"bimg"},React.createElement("img",{src:src,alt:""})));
}
function Cta(p){
  return React.createElement("div",{className:"row in"},
    React.createElement("div",{className:"ctab"},
      React.createElement("div",{className:"ctab-txt"},p.text),
      React.createElement("a",{className:"ctab-btn",href:CONFIG.ctaLink,target:"_blank",rel:"noopener noreferrer",onClick:trackInitiateCheckout},CONFIG.ctaBtn)));
}

function App(){
  var sv=loadState();
  var returning=isReturning();
  // Incrementa returnCount a cada visita de retorno
  var savedRetCnt=sv?(sv.returnCount||0):0;
  var initRetCnt=returning?savedRetCnt+1:savedRetCnt;
  // hot_remarketing = returnCount > 2 (4ª visita em diante)
  var initFlow=returning?(initRetCnt>2?"hot_remarketing":"remarketing"):"normal";

  var _s=useState(returning?50:(sv?sv.stage:-1)),stage=_s[0],setStage=_s[1];
  var _n=useState(sv?sv.name:""),uname=_n[0],setUname=_n[1];
  var _m=useState(returning?(sv?sv.messages:[]):[]),msgs=_m[0],setMsgs=_m[1];
  var _t=useState(false),typing=_t[0],setTyping=_t[1];
  var _i=useState(""),inp=_i[0],setInp=_i[1];
  var _l=useState(false),locked=_l[0],setLocked=_l[1];
  var _st=useState("online"),status=_st[0],setStatus=_st[1];
  var _rc=useState(sv?sv.reactivations||0:0),reactivations=_rc[0],setReactivations=_rc[1];

  var endRef=useRef(null),inpRef=useRef(null),rtRef=useRef(null);
  var stgRef=useRef(returning?50:(sv?sv.stage:-1));
  var nmRef=useRef(sv?sv.name:"");
  var rcRef=useRef(sv?sv.reactivations||0:0);
  var retCntRef=useRef(initRetCnt);
  var ftRef=useRef(initFlow);
  // rmStageRef: estágios do remarketing normal
  var rmStageRef=useRef(0);
  // hrRef: estágios do hot remarketing (lead quente, returnCount > 2)
  var hrRef=useRef(0);

  useEffect(function(){stgRef.current=stage;},[stage]);
  useEffect(function(){nmRef.current=uname;},[uname]);
  useEffect(function(){rcRef.current=reactivations;},[reactivations]);
  useEffect(function(){if(endRef.current)endRef.current.scrollIntoView({behavior:"smooth"});},[msgs,typing]);
  useEffect(function(){saveState(msgs,stage,uname,reactivations,retCntRef.current);},[msgs,stage,uname,reactivations]);

  var addMsg=useCallback(function(m){setMsgs(function(p){return p.concat([m]);});},[]);

  var sendBot=useCallback(function(lines){
    return new Promise(function(resolve){
      setLocked(true);
      var i=0;
      function next(){
        if(i>=lines.length){setLocked(false);if(inpRef.current)inpRef.current.focus();resolve();return;}
        var line=lines[i];i++;
        setStatus("digitando...");setTyping(true);
        sleep(randDelay()).then(function(){
          setTyping(false);setStatus("online");
          if(line&&line.type==="img") addMsg({type:"img",src:line.src||""});
          else if(line&&line.type==="cta") addMsg({type:"cta",text:line.text});
          else addMsg({from:"julia",text:line,time:tnow(),type:"txt"});
          if(i<lines.length) sleep(CONFIG.betweenMessagesDelay).then(next);
          else next();
        });
      }
      next();
    });
  },[addMsg]);

  var resetRT=useCallback(function(){
    if(rtRef.current)clearTimeout(rtRef.current);
    rtRef.current=setTimeout(function(){
      var rc=rcRef.current,n=nmRef.current;
      if(rc<CONFIG.maxReactivations){
        var pair=pick(CONFIG.reactivation);
        setReactivations(function(r){return r+1;});
        sendBot([fmt(pair[0],n)].concat(pair[1]?[fmt(pair[1],n)]:[]));
      }
    },CONFIG.reactivationDelay);
  },[sendBot]);

  // --- NORMAL FUNNEL ---
  // Cada stage envia exatamente 1 bloco de mensagem e para.
  // Só avança quando o cliente responde.
  var advanceFunnel=useCallback(function(text){
    var s=stgRef.current,n=nmRef.current;
    var intent=detectIntent(text);

    // s=0: esperando o nome
    if(s===0){
      var nm=extractName(text);
      setUname(nm);nmRef.current=nm;setStage(1);
      var p=pick(CONFIG.funnel.s1);
      sendBot([fmt(p[0],nm)].concat(p[1]?[fmt(p[1],nm)]:[]));
      return;
    }
    // s=1: cliente reagiu ao elogio do nome → perguntar curiosidade
    if(s===1){
      setStage(2);
      var p2=pick(CONFIG.funnel.s2);
      sendBot([fmt(p2[0],n)].concat(p2[1]?[fmt(p2[1],n)]:[]));
      return;
    }
    // s=2: cliente respondeu a curiosidade → observação de personalidade
    if(s===2){
      setStage(3);
      var p3=pick(CONFIG.funnel.s3);
      sendBot([fmt(p3[0],n)].concat(p3[1]?[fmt(p3[1],n)]:[]));
      return;
    }
    // s=3: cliente reagiu → hook de atenção
    if(s===3){
      setStage(4);
      var p4=pick(CONFIG.funnel.s4);
      sendBot([fmt(p4[0],n)].concat(p4[1]?[fmt(p4[1],n)]:[]));
      return;
    }
    // s=4: cliente reagiu → teaser do conteúdo
    if(s===4){
      setStage(5);
      var p5=pick(CONFIG.funnel.s5);
      sendBot([fmt(p5[0],n)].concat(p5[1]?[fmt(p5[1],n)]:[]));
      return;
    }
    // s=5: cliente reagiu ao teaser → pedir promessa
    if(s===5){
      setStage(6);
      var p6=pick(CONFIG.funnel.s6);
      sendBot([fmt(p6[0],n)].concat(p6[1]?[fmt(p6[1],n)]:[]));
      return;
    }
    // s=6: aguardando promessa do cliente
    if(s===6){
      if(intent==="neg"){
        var pn=pick(CONFIG.negative);
        sendBot([fmt(pn[0],n)].concat(pn[1]?[fmt(pn[1],n)]:[]));
        return;
      }
      if(intent==="hes"){
        var ph=pick(CONFIG.hesitation);
        sendBot([fmt(ph[0],n)].concat(ph[1]?[fmt(ph[1],n)]:[]));
        return;
      }
      if(intent==="redirect"){
        var rr=pick(CONFIG.redirect);
        sendBot([fmt(rr[0],n)].concat(rr[1]?[fmt(rr[1],n)]:[]));
        return;
      }
      // pos: imagem + reação s7 em um único sendBot — input permanece bloqueado até o final
      setStage(7);
      var p7=pick(CONFIG.funnel.s7);
      sendBot([{type:"img",src:CONFIG.hookImage},fmt(p7[0],n)].concat(p7[1]?[fmt(p7[1],n)]:[]));
      return;
    }
    // s=7: cliente viu a imagem → continuar aquecimento
    if(s===7){
      setStage(8);
      var p8=pick(CONFIG.funnel.s8);
      sendBot([fmt(p8[0],n)].concat(p8[1]?[fmt(p8[1],n)]:[]));
      return;
    }
    // s=8: cliente reagiu → criar desejo
    if(s===8){
      setStage(9);
      var p9=pick(CONFIG.funnel.s9);
      sendBot([fmt(p9[0],n)].concat(p9[1]?[fmt(p9[1],n)]:[]));
      return;
    }
    // s=9: cliente reagiu → pergunta de decisão
    if(s===9){
      setStage(10);
      var p10=pick(CONFIG.funnel.s10);
      sendBot([fmt(p10[0],n)].concat(p10[1]?[fmt(p10[1],n)]:[]));
      return;
    }
    // s=10: pergunta final de decisão
    if(s===10){
      if(intent==="neg"){
        var p10n=pick(CONFIG.negative);
        sendBot([fmt(p10n[0],n)].concat(p10n[1]?[fmt(p10n[1],n)]:[]));
        return;
      }
      if(intent==="hes"){
        var p10h=pick(CONFIG.hesitation);
        sendBot([fmt(p10h[0],n)].concat(p10h[1]?[fmt(p10h[1],n)]:[]));
        return;
      }
      if(intent==="redirect"){
        var rr2=pick(CONFIG.redirect);
        sendBot([fmt(rr2[0],n)].concat(rr2[1]?[fmt(rr2[1],n)]:[]));
        return;
      }
      // pos: CTA + urgência em um único sendBot — fechamento contínuo
      setStage(12);
      var p11=pick(CONFIG.funnel.s11);
      var p12=pick(CONFIG.funnel.s12);
      sendBot([{type:"cta",text:fmt(p11.join("\n"),n)},fmt(p12[0],n)].concat(p12[1]?[fmt(p12[1],n)]:[]));
      return;
    }
    if(s>=11){sendBot(["Nao perde tempo nao, "+n,"O link ta la te esperando"]);return;}
    var rr3=pick(CONFIG.redirect);
    sendBot([fmt(rr3[0],n)].concat(rr3[1]?[fmt(rr3[1],n)]:[]));
  },[sendBot]);

  // --- REMARKETING FUNNEL ---
  // rmStageRef: 0=r0+r1 enviados; 1=r2 enviado; 2=r3 enviado; 3=img+r4 enviados; 4=r5 enviado; 5=CTA enviado
  // Cada etapa aguarda o cliente responder antes de avançar.
  var advanceRemarketingFunnel=useCallback(function(text){
    var rs=rmStageRef.current,n=nmRef.current;
    var intent=detectIntent(text);
    // rs=0: cliente respondeu ao boas-vindas → mostrar o que perdeu
    if(rs===0){
      rmStageRef.current=1;
      var p2=pick(REMARKETING.r2);
      sendBot([fmt(p2[0],n)].concat(p2[1]?[fmt(p2[1],n)]:[]));
      return;
    }
    // rs=1: cliente respondeu → perguntar se quer ver
    if(rs===1){
      rmStageRef.current=2;
      var p3=pick(REMARKETING.r3);
      sendBot([fmt(p3[0],n)].concat(p3[1]?[fmt(p3[1],n)]:[]));
      return;
    }
    // rs=2: cliente respondeu à pergunta de ver
    if(rs===2){
      if(intent==="neg"){
        var p3b=pick(REMARKETING.r3);
        sendBot([fmt(p3b[0],n)].concat(p3b[1]?[fmt(p3b[1],n)]:[]));
        return;
      }
      if(intent==="hes"){
        var p3h=pick(REMARKETING.r3);
        sendBot([fmt(p3h[0],n)].concat(p3h[1]?[fmt(p3h[1],n)]:[]));
        return;
      }
      // pos/redirect: imagem + r4 em um único sendBot
      rmStageRef.current=3;
      var p4=pick(REMARKETING.r4);
      sendBot([{type:"img",src:CONFIG.remarketingHookImage},fmt(p4[0],n)].concat(p4[1]?[fmt(p4[1],n)]:[]));
      return;
    }
    // rs=3: cliente viu a imagem → continuar com r5
    if(rs===3){
      rmStageRef.current=4;
      var p5=pick(REMARKETING.r5);
      sendBot([fmt(p5[0],n)].concat(p5[1]?[fmt(p5[1],n)]:[]));
      return;
    }
    // rs=4: cliente reagiu ao r5 → CTA + urgência (fechamento)
    if(rs===4){
      if(intent==="neg"){
        var p5b=pick(REMARKETING.r5);
        sendBot([fmt(p5b[0],n)].concat(p5b[1]?[fmt(p5b[1],n)]:[]));
        return;
      }
      if(intent==="hes"){
        var p5h=pick(REMARKETING.r5);
        sendBot([fmt(p5h[0],n)].concat(p5h[1]?[fmt(p5h[1],n)]:[]));
        return;
      }
      // CTA + urgência em um único sendBot — fechamento direto para remarketing
      rmStageRef.current=5;
      var p6=pick(REMARKETING.r6);
      var p7=pick(REMARKETING.r7);
      sendBot([{type:"cta",text:fmt(p6[0],n)},fmt(p7[0],n)].concat(p7[1]?[fmt(p7[1],n)]:[]));
      return;
    }
    // rs>=5: urgência final
    var p8=pick(REMARKETING.r8);sendBot([fmt(p8[0],n)].concat(p8[1]?[fmt(p8[1],n)]:[]));
  },[sendBot]);

  // --- HOT REMARKETING (lead quente — returnCount > 2) ---
  // Fluxo inteligente com branching por intent. Máximo 1 bloco por turno.
  var advanceHotRemarketingFunnel=useCallback(function(text){
    var hr=hrRef.current,n=nmRef.current;
    var intent=detectIntent(text);
    var ctx=detectContext(text);
    var isPrice=ctx==="preco";

    // hr=0: cliente respondeu à saudação inicial
    if(hr===0){
      if(isPrice){
        // Perguntou preço direto → dar valor + CTA direto
        hrRef.current=3;
        sendBot([
          HOT_REMARKETING.priceLines[0],
          HOT_REMARKETING.priceLines[1],
          {type:"cta",text:HOT_REMARKETING.priceCta}
        ]);
        return;
      }
      if(intent==="neg"){
        // Negativa → suave, sem pressão
        var pn=pick(HOT_REMARKETING.negLines);
        sendBot([pn[0]].concat(pn[1]?[pn[1]]:[]));
        // mantém hr=0, espera próxima mensagem
        return;
      }
      if(intent==="hes"){
        // Hesitação → pressão leve com urgência
        hrRef.current=2;
        sendBot([
          HOT_REMARKETING.hesLines[0],
          HOT_REMARKETING.hesLines[1],
          HOT_REMARKETING.hesCta
        ]);
        return;
      }
      // pos ou qualquer outra resposta → mostrar prévia + CTA
      hrRef.current=2;
      sendBot([
        {type:"img",src:CONFIG.hotRemarketingOfferImage},
        HOT_REMARKETING.offerLines[0],
        HOT_REMARKETING.offerLines[1],
        {type:"cta",text:HOT_REMARKETING.offerCta}
      ]);
      return;
    }

    // hr=1 ou hr=2: cliente já viu prévia ou hesitação, respondendo
    if(hr<=2){
      if(isPrice){
        hrRef.current=3;
        sendBot([
          HOT_REMARKETING.priceLines[0],
          HOT_REMARKETING.priceLines[1],
          {type:"cta",text:HOT_REMARKETING.priceCta}
        ]);
        return;
      }
      if(intent==="neg"){
        hrRef.current=3;
        sendBot([
          "Tudo bem… a oferta ainda ta aqui se mudar de ideia 😌",
          {type:"cta",text:"O acesso esta liberado. Clica aqui quando quiser."}
        ]);
        return;
      }
      // pos ou hes → fechar
      hrRef.current=3;
      sendBot([
        HOT_REMARKETING.closeLines[0],
        HOT_REMARKETING.closeLines[1],
        {type:"cta",text:"Clica aqui e entra agora 👇"}
      ]);
      return;
    }

    // hr>=3: urgência final
    sendBot([{type:"cta",text:"O acesso ainda ta liberado. Nao perde essa chance 👇"}]);
  },[sendBot]);

  var handleSend=useCallback(function(text){
    if(!text.trim()||locked)return;
    addMsg({from:"user",text:text.trim(),time:tnow(),type:"txt"});
    setInp("");resetRT();
    setLocked(true);
    // Espera 4s, depois mostra digitando, depois envia 1 mensagem do funil.
    // Sem AI reply intermediário — garante no máximo 1 resposta por turno.
    sleep(CONFIG.responseStartDelay).then(function(){
      if(ftRef.current==="hot_remarketing") return advanceHotRemarketingFunnel(text);
      if(ftRef.current==="remarketing") return advanceRemarketingFunnel(text);
      return advanceFunnel(text);
    });
  },[locked,addMsg,advanceFunnel,advanceRemarketingFunnel,advanceHotRemarketingFunnel,resetRT]);

  // --- INIT ---
  useEffect(function(){
    var sv3=loadState();
    var ret=!!(sv3&&sv3.name&&sv3.messages&&sv3.messages.length>0);
    if(ret){
      var n=sv3.name;
      nmRef.current=n;
      var retCnt=retCntRef.current; // já incrementado no topo do App()
      if(retCnt>2){
        // Lead quente: 4ª visita ou mais → hot remarketing
        ftRef.current="hot_remarketing";
        hrRef.current=0;
        setTimeout(function(){
          var hw=pick(HOT_REMARKETING.welcome);
          sendBot([fmt(hw[0],n),fmt(hw[1],n)]);
        },CONFIG.responseStartDelay);
      } else {
        // Retorno normal → remarketing padrão
        ftRef.current="remarketing";
        rmStageRef.current=0;
        setTimeout(function(){
          var rp=pick(REMARKETING.r0);
          sendBot([fmt(rp[0],n)].concat(rp[1]?[fmt(rp[1],n)]:[])).then(function(){
            return sleep(CONFIG.betweenMessagesDelay);
          }).then(function(){
            var rp2=pick(REMARKETING.r1);
            sendBot([fmt(rp2[0],n)].concat(rp2[1]?[fmt(rp2[1],n)]:[]));
          });
        },CONFIG.responseStartDelay);
      }
    } else {
      ftRef.current="normal";
      setTimeout(function(){
        var pair=pick(CONFIG.funnel.s0);
        sendBot(pair);setStage(0);
      },CONFIG.responseStartDelay);
    }
    resetRT();
    return function(){if(rtRef.current)clearTimeout(rtRef.current);};
  },[]);

  function renderMsg(m,i){
    if(m.type==="img") return React.createElement(Img,{key:i,src:m.src});
    if(m.type==="cta") return React.createElement(Cta,{key:i,text:m.text});
    return React.createElement(Bubble,{key:i,msg:m});
  }

  var today=new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"});

  return React.createElement("div",{className:"shell"},
    React.createElement("div",{className:"ch"},
      React.createElement("img",{className:"ch-av",src:CONFIG.avatar,alt:CONFIG.name}),
      React.createElement("div",{className:"ch-info"},
        React.createElement("div",{className:"ch-name"},CONFIG.name),
        React.createElement("div",{className:"ch-status"+(typing?" typing":"")},typing?"digitando...":status)),
      ),
    React.createElement("div",{className:"msgs"},
      React.createElement("div",{className:"dsep"},React.createElement("span",null,"Hoje - "+today)),
      msgs.map(function(m,i){return renderMsg(m,i);}),
      typing&&React.createElement(Dots,null),
      React.createElement("div",{ref:endRef})),
    React.createElement("div",{className:"inp-area"},
      React.createElement("textarea",{
        ref:inpRef,className:"inp",placeholder:"Digite uma mensagem",
        value:inp,rows:1,disabled:locked,
        onChange:function(e){setInp(e.target.value);e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,120)+"px";},
        onKeyDown:function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();handleSend(inp);}}
      }),
      React.createElement("button",{
        className:"sbtn",disabled:locked||!inp.trim(),
        onClick:function(){handleSend(inp);}
      },">>")));
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
</body>
